<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>低压电工证 · 模拟考试</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ========================================================================
     ⚡ CYBERPUNK THEME — Mobile-First
     配色：深空底 + 霓虹青 / 紫 / 綠 / 粉
     ======================================================================== */
  :root {
    --bg-deep: #050510;
    --bg-main: #0a0a1a;
    --bg-card: #0d0d25;
    --bg-elevated: #121235;
    --border: #1a2a48;
    --border-glow: rgba(0, 229, 255, 0.15);
    --neon-cyan: #00e5ff;
    --neon-green: #00ff41;
    --neon-yellow: #ffe500;
    --neon-pink: #ff006e;
    --neon-purple: #b400ff;
    --neon-orange: #ff6d00;
    --text-primary: #d0d0f0;
    --text-secondary: #8899bb;
    --text-muted: #506080;
    --shadow-cyan: 0 0 12px rgba(0, 229, 255, 0.25);
    --shadow-green: 0 0 12px rgba(0, 255, 65, 0.25);
    --shadow-pink: 0 0 12px rgba(255, 0, 110, 0.25);
    --glow-cyan: 0 0 24px rgba(0, 229, 255, 0.35), 0 0 48px rgba(0, 229, 255, 0.1);
    --glow-green: 0 0 24px rgba(0, 255, 65, 0.35), 0 0 48px rgba(0, 255, 65, 0.1);
    --glow-pink: 0 0 24px rgba(255, 0, 110, 0.35), 0 0 48px rgba(255, 0, 110, 0.1);
    --font-mono: "JetBrains Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
  }

  body {
    font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
    background: var(--bg-main); color: var(--text-primary);
    min-height: 100vh; min-height: 100dvh;
    display: flex; justify-content: center; align-items: flex-start;
    user-select: none; -webkit-user-select: none;
    position: relative; overflow-x: hidden;
  }
  /* 掃描線疊層 */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px, rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 5px
    );
  }

  .app {
    width: 100%; max-width: 100%; height: auto; min-height: 100dvh;
    display: flex; flex-direction: column; position: relative; z-index: 1;
  }

  /* ===== 視圖容器 ===== */
  .view { display: none; flex: 1; }
  .view.active { display: flex; flex-direction: column; }

  /* ===== 按鈕 ===== */
  .btn {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 24px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s ease; font-family: inherit;
    position: relative; overflow: hidden; letter-spacing: 0.5px;
    background: rgba(255,255,255,0.03); color: var(--text-secondary);
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: rgba(0, 229, 255, 0.08); color: var(--neon-cyan);
    border-color: rgba(0, 229, 255, 0.25); box-shadow: var(--shadow-cyan);
  }
  .btn-primary:hover { background: rgba(0, 229, 255, 0.15); box-shadow: var(--glow-cyan); color: #fff; }

  .btn-success {
    background: rgba(0, 255, 65, 0.08); color: var(--neon-green);
    border-color: rgba(0, 255, 65, 0.25); box-shadow: var(--shadow-green);
  }
  .btn-success:hover { background: rgba(0, 255, 65, 0.15); box-shadow: var(--glow-green); color: #fff; }

  .btn-warning {
    background: rgba(255, 229, 0, 0.08); color: var(--neon-yellow);
    border-color: rgba(255, 229, 0, 0.25); box-shadow: 0 0 12px rgba(255, 229, 0, 0.2);
  }
  .btn-warning:hover { background: rgba(255, 229, 0, 0.15); box-shadow: 0 0 24px rgba(255, 229, 0, 0.35); }

  .btn-danger {
    background: rgba(255, 0, 110, 0.08); color: var(--neon-pink);
    border-color: rgba(255, 0, 110, 0.25); box-shadow: var(--shadow-pink);
  }
  .btn-danger:hover { background: rgba(255, 0, 110, 0.15); box-shadow: var(--glow-pink); color: #fff; }

  .btn-purple {
    background: rgba(180, 0, 255, 0.08); color: var(--neon-purple);
    border-color: rgba(180, 0, 255, 0.25); box-shadow: 0 0 12px rgba(180, 0, 255, 0.2);
  }
  .btn-purple:hover { background: rgba(180, 0, 255, 0.15); box-shadow: 0 0 24px rgba(180, 0, 255, 0.35); }

  .btn-secondary {
    background: rgba(80, 96, 128, 0.12); color: var(--text-secondary);
    border-color: rgba(80, 96, 128, 0.2);
  }
  .btn-secondary:hover { background: rgba(80, 96, 128, 0.25); color: var(--text-primary); }

  .btn-lg { padding: 14px 40px; font-size: 17px; border-radius: 10px; text-transform: uppercase; letter-spacing: 2px; }
  .btn-sm { padding: 6px 16px; font-size: 12px; border-radius: 6px; }
  .btn-icon { padding: 8px 12px; font-size: 16px; }

  /* ===== 首頁（手機端默認）===== */
  #home-view { justify-content: center; align-items: center; text-align: center; gap: 16px; padding: 48px 20px 32px; }
  #home-view h1 {
    font-size: 22px; color: var(--neon-cyan);
    text-shadow: 0 0 20px rgba(0, 229, 255, 0.4), 0 0 40px rgba(0, 229, 255, 0.1);
    letter-spacing: 1px;
  }
  #home-view .subtitle { color: var(--text-secondary); font-size: 13px; max-width: 100%; line-height: 1.7; }

  /* ========================================================================
     考試頁 — 手機端默認（上下堆疊）
     ======================================================================== */
  #exam-view { flex-direction: column; overflow: hidden; }

  /* 答題卡：頂部橫條 */
  .answer-card {
    width: 100%; min-width: unset; flex-shrink: 0; background: var(--bg-card);
    flex-direction: row; flex-wrap: wrap; align-items: center;
    padding: 6px 10px; gap: 4px 8px;
    border-right: none; border-bottom: 1px solid var(--border);
    display: flex; overflow: hidden;
  }
  .answer-card-title { color: var(--text-secondary); font-size: 11px; font-weight: 600; margin-bottom: 0; white-space: nowrap; }
  .answer-card-stats { color: var(--text-muted); font-size: 10px; margin-bottom: 0; white-space: nowrap; }
  .grid {
    flex-basis: 100%; display: flex; flex-wrap: nowrap; overflow-x: auto;
    margin-bottom: 0; gap: 2px; padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
  }
  .grid-item {
    display: inline-flex; width: 18px; height: 18px; flex-shrink: 0;
    align-items: center; justify-content: center;
    border-radius: 3px; font-size: 10px; font-weight: 600; cursor: pointer;
    background: rgba(255,255,255,0.05); color: var(--text-muted);
    border: 1px solid transparent; transition: all 0.15s ease;
  }
  .grid-item:hover { transform: scale(1.2); border-color: var(--neon-cyan); }
  .grid-item.answered { background: rgba(0, 255, 65, 0.2); color: var(--neon-green); border-color: rgba(0, 255, 65, 0.4); }
  .grid-item.marked  { background: rgba(255, 229, 0, 0.2); color: var(--neon-yellow); border-color: rgba(255, 229, 0, 0.4); }
  .grid-item.current  { border: 2px solid var(--neon-cyan); color: var(--neon-cyan); background: transparent; box-shadow: var(--shadow-cyan); }
  .grid-item.marked-current { border: 2px solid var(--neon-cyan); background: rgba(255, 0, 110, 0.3); color: #fff; box-shadow: var(--shadow-pink); }
  .legend { display: none; }

  /* 題目主區 */
  .exam-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .exam-header {
    background: var(--bg-card); padding: 6px 10px; font-size: 11px; gap: 4px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
    flex-shrink: 0; color: var(--text-secondary);
  }
  .exam-header .title { font-weight: 700; font-size: 12px; color: var(--neon-cyan); letter-spacing: 0.5px; }
  .exam-body { flex: 1; padding: 14px 14px; overflow-y: auto; }
  .question-type {
    display: inline-block; background: rgba(180, 0, 255, 0.2); color: var(--neon-purple);
    padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; margin-bottom: 10px;
    border: 1px solid rgba(180, 0, 255, 0.3); letter-spacing: 1px; text-transform: uppercase;
  }
  .question-type.multi { background: rgba(255, 0, 110, 0.15); color: var(--neon-pink); border-color: rgba(255, 0, 110, 0.3); }
  .question-type.judge { background: rgba(0, 229, 255, 0.12); color: var(--neon-cyan); border-color: rgba(0, 229, 255, 0.25); }
  .question-text { font-size: 14px; line-height: 1.75; margin-bottom: 16px; }
  .options-list { display: flex; flex-direction: column; gap: 6px; }
  .option-item {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 12px; font-size: 14px; min-height: 44px;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: all 0.2s ease; line-height: 1.5;
    background: rgba(255,255,255,0.02);
  }
  .option-item:hover { border-color: var(--neon-cyan); background: rgba(0, 229, 255, 0.04); }
  .option-item.selected {
    border-color: var(--neon-cyan); background: rgba(0, 229, 255, 0.08);
    color: var(--neon-cyan); box-shadow: var(--shadow-cyan);
  }
  .option-letter {
    display: inline-flex; width: 24px; height: 24px;
    border-radius: 50%; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; flex-shrink: 0;
    background: rgba(255,255,255,0.06); color: var(--text-secondary);
  }
  .option-item.selected .option-letter { background: rgba(0, 229, 255, 0.2); color: var(--neon-cyan); box-shadow: var(--shadow-cyan); }
  .option-letter.square { border-radius: 6px; }

  /* 底欄按鈕：兩行網格 */
  .exam-footer {
    border-top: 1px solid var(--border); padding: 6px 8px; gap: 5px;
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
    background: var(--bg-card); flex-shrink: 0;
  }
  .exam-footer .btn {
    padding: 8px 0; font-size: 13px; border-radius: 7px;
    flex: 1 1 calc(50% - 5px); min-width: 0; text-align: center; white-space: nowrap;
  }
  .exam-footer .btn-danger { flex: 1 1 100%; }

  /* ===== 彈窗 ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(5,5,16,0.85); backdrop-filter: blur(4px);
    z-index: 100; justify-content: center; align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 12px; padding: 22px 20px; max-width: calc(100vw - 32px); margin: 0 16px;
    text-align: center; box-shadow: var(--glow-cyan);
  }
  .modal h3 { margin-bottom: 12px; font-size: 17px; color: var(--neon-cyan); }
  .modal .info { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; line-height: 1.7; }

  /* ===== 評分頁 ===== */
  .result-view { justify-content: center; align-items: center; text-align: center; gap: 10px; padding: 32px 16px; }
  .result-view h2 { font-size: 20px; color: var(--neon-cyan); text-shadow: 0 0 15px rgba(0, 229, 255, 0.3); }
  .score-circle {
    width: 120px; height: 120px; border-radius: 50%; border-width: 4px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 4px solid var(--neon-green); margin-bottom: 4px;
    box-shadow: var(--glow-green); transition: all 0.5s ease;
  }
  .score-circle.fail { border-color: var(--neon-pink); box-shadow: var(--glow-pink); }
  .score-value { font-size: 36px; font-weight: 800; line-height: 1; font-family: var(--font-mono); }
  .score-suffix { font-size: 13px; color: var(--text-secondary); }
  .stat-row { display: flex; gap: 16px; font-size: 14px; flex-wrap: wrap; justify-content: center; }
  .stat-row strong { color: var(--neon-cyan); }

  /* ===== 錯題回顧 ===== */
  .review-body { flex: 1; overflow-y: auto; padding: 10px 10px; }
  .review-item {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; margin-bottom: 10px;
  }
  .review-item .q-text { font-size: 14px; margin-bottom: 10px; line-height: 1.7; }
  .review-item .options-list { font-size: 13px; margin: 8px 0; line-height: 2; }
  .review-item .opt-row { padding: 3px 10px; border-radius: 5px; margin: 3px 0; }
  .review-item .opt-row.wrong-pick { background: rgba(255, 0, 110, 0.1); border-left: 3px solid var(--neon-pink); color: #f5a0c0; }
  .review-item .opt-row.correct-pick { background: rgba(0, 255, 65, 0.1); border-left: 3px solid var(--neon-green); color: #a0f0b0; }
  .review-item .opt-row.neutral { color: var(--text-muted); }
  .review-item .opt-row .tag { font-size: 11px; opacity: 0.85; margin-left: 8px; }
  .review-item .explanation { color: var(--text-secondary); font-size: 12px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.6; }
  .review-item .fc-add-row { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); text-align: right; }

  /* ===== 閃卡複習頁 ===== */
  #flashcard-view { background: var(--bg-main); }
  .fc-header {
    background: var(--bg-card); padding: 8px 14px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .fc-header .title { font-size: 14px; font-weight: 700; color: var(--neon-purple); }
  .fc-header .stats { font-size: 12px; color: var(--text-secondary); }
  .fc-container {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 20px 16px; perspective: 1000px;
  }
  .flashcard {
    width: 100%; max-width: 400px; min-height: 240px;
    position: relative; cursor: pointer;
    transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .fc-front, .fc-back {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 14px; padding: 24px 20px;
    display: flex; flex-direction: column;
    border: 1px solid var(--border);
    overflow-y: auto;
  }
  .fc-front {
    background: var(--bg-card); justify-content: center; align-items: center; text-align: center;
    box-shadow: 0 0 30px rgba(180, 0, 255, 0.1);
  }
  .fc-back {
    background: var(--bg-elevated); transform: rotateY(180deg);
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
  }
  .fc-label {
    font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--neon-purple); margin-bottom: 16px;
  }
  .fc-back .fc-label { color: var(--neon-cyan); }
  .fc-question { font-size: 16px; line-height: 1.8; color: var(--text-primary); }
  .fc-answer { font-size: 16px; font-weight: 700; color: var(--neon-green); margin-bottom: 12px; }
  .fc-explanation { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .fc-type-badge {
    display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 8px;
    background: rgba(180, 0, 255, 0.15); color: var(--neon-purple); margin-bottom: 12px;
  }
  .fc-hint { font-size: 11px; color: var(--text-muted); margin-top: 16px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  .fc-actions {
    display: flex; gap: 10px; padding: 10px 16px; justify-content: center;
    border-top: 1px solid var(--border); background: var(--bg-card); flex-shrink: 0;
  }
  .fc-actions .btn { flex: 1; max-width: 160px; }
  .fc-progress {
    text-align: center; padding: 8px; font-size: 12px; color: var(--text-muted);
    font-family: var(--font-mono);
  }
  .fc-empty {
    text-align: center; padding: 60px 20px; color: var(--text-secondary);
  }
  .fc-empty .icon { font-size: 48px; margin-bottom: 16px; }
  .fc-deck-info {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; margin-top: 4px; text-align: left; max-width: 320px;
  }
  .fc-deck-info .deck-stat { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .fc-deck-info .deck-stat span:first-child { color: var(--text-secondary); }
  .fc-deck-info .deck-stat span:last-child { color: var(--neon-cyan); font-weight: 600; }

  .btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  .btn-row .btn { padding: 10px 16px; font-size: 14px; }
  .hidden { display: none !important; }

  /* ===== 鍵盤提示 ===== */
  .key-hint { display: none; }  /* 手機無實體鍵盤 */

  /* ===== 滾動條 ===== */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* ========================================================================
     桌面端覆寫  (≥769px)
     ======================================================================== */
  @media (min-width: 769px) {
    body { align-items: center; }
    .app { max-width: 960px; height: 100vh; min-height: auto; }

    /* 首頁 */
    #home-view { padding: 0; gap: 24px; }
    #home-view h1 { font-size: 32px; }
    #home-view .subtitle { font-size: 15px; max-width: 480px; }
    .key-hint { display: block; font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .fc-deck-info { max-width: 400px; }

    /* 考試頁：上下 → 左右 */
    #exam-view { flex-direction: row; }

    /* 答題卡：頂部橫條 → 左側豎欄 */
    .answer-card {
      width: 130px; min-width: 130px; flex-shrink: 1;
      flex-direction: column; flex-wrap: nowrap; align-items: stretch;
      padding: 14px 12px; gap: 0;
      border-right: 1px solid var(--border); border-bottom: none;
      overflow-y: auto; overflow-x: hidden;
    }
    .answer-card-title { font-size: 13px; margin-bottom: 6px; white-space: normal; }
    .answer-card-stats { font-size: 11px; margin-bottom: 10px; white-space: normal; }
    .grid {
      flex-wrap: wrap; overflow-x: visible; flex-basis: auto;
      margin-bottom: 12px; gap: 3px; padding-bottom: 0;
    }
    .grid-item { width: 24px; height: 24px; font-size: 11px; flex-shrink: 1; }
    .legend {
      display: block; font-size: 10px; color: var(--text-muted); line-height: 2;
      border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px;
    }

    /* 題目區域 */
    .exam-main { min-height: auto; }
    .exam-header { padding: 10px 20px; font-size: 14px; flex-wrap: nowrap; }
    .exam-header .title { font-size: 16px; }
    .exam-body { padding: 24px 28px; }
    .question-type { font-size: 12px; padding: 2px 12px; margin-bottom: 14px; }
    .question-text { font-size: 16px; line-height: 1.8; margin-bottom: 22px; }
    .options-list { gap: 8px; }
    .option-item { padding: 12px 16px; font-size: 15px; min-height: auto; align-items: flex-start; }
    .option-letter { width: 26px; height: 26px; font-size: 13px; }

    /* 底欄 */
    .exam-footer { padding: 10px 20px; flex-wrap: nowrap; }
    .exam-footer .btn {
      flex: none; padding: 10px 24px; font-size: 15px; border-radius: 8px;
      min-width: auto; text-align: auto; white-space: auto;
    }
    .exam-footer .btn-danger { flex: none; }

    /* 彈窗 */
    .modal { padding: 28px 32px; max-width: 400px; }
    .modal h3 { font-size: 19px; }
    .modal .info { font-size: 14px; }

    /* 評分 */
    .result-view { padding: 40px 20px; gap: 14px; }
    .result-view h2 { font-size: 24px; }
    .score-circle { width: 150px; height: 150px; border-width: 5px; }
    .score-value { font-size: 44px; }
    .score-suffix { font-size: 15px; }
    .stat-row { gap: 28px; font-size: 15px; }

    /* 錯題 */
    .review-body { padding: 20px 24px; }
    .review-item { padding: 16px; margin-bottom: 14px; }
    .review-item .q-text { font-size: 15px; }

    /* 閃卡 */
    .fc-header { padding: 10px 20px; }
    .fc-header .title { font-size: 16px; }
    .fc-container { padding: 32px 24px; }
    .flashcard { max-width: 500px; min-height: 280px; }
    .fc-front, .fc-back { padding: 32px 28px; }
    .fc-question { font-size: 18px; }

    /* 按鈕行 */
    .btn-row { gap: 12px; }
    .btn-row .btn { padding: 10px 24px; font-size: 15px; }

    /* 滾動條 */
    ::-webkit-scrollbar { width: 5px; height: auto; }
  }

  /* ========================================================================
     小屏手機微調  (≤400px)
     ======================================================================== */
  @media (max-width: 400px) {
    #home-view h1 { font-size: 19px; }
    .exam-header { font-size: 10px; }
    .exam-header .title { font-size: 11px; }
    .question-text { font-size: 13px; }
    .option-item { font-size: 13px; padding: 10px 10px; }
    .exam-footer .btn { font-size: 12px; padding: 7px 0; }

  {id: 1132, type: "single", question: "567、无论三相电路是Y接或△接，当三相电路对称时，其总有功功率为()。", options: ["P=3Ulcosφ","P=3PU PV PW","P=√3Ulcosφ","P=√2Ulcosφ"], answer: [2], explanation: "三相对称总有功P=√3Ulcosφ"},
  {id: 1133, type: "single", question: "568、1kV以上的电容器组采用()接成三角形作为放电装置。", options: ["电炽灯","电压互感器","电流互感器"], answer: [1], explanation: "1kV上电容用电压互感器放电"},
  {id: 1134, type: "single", question: "569、电气火灾发生时，作为当班电工，应先切断电源再扑救，但为了不影响扑救，避免火灾范围进一步扩大，应采取的措施是()。", options: ["直接用水灭火","为了安全应立即切断总电源","选择性的断开引起火灾的电源支路开关"], answer: [2], explanation: "电气火灾选断起火支路开关"},
  {id: 1135, type: "single", question: "570、线圈中感应电动势的大小，与线圈的匝数()。", options: ["成反比","成正比","无关"], answer: [1], explanation: "感应电动势与匝数成正比"},
  {id: 1136, type: "single", question: "571、在配电线路中，熔断器仅作短路保护时，熔体的额定电流应不大于()。", options: ["穿管绝缘导线允许载流量的3倍","电缆允许载流量的2.5倍","绝缘导线允许载流量的2.5倍"], answer: [1], explanation: "短路熔体电流不超电缆2.5倍"},
  {id: 1137, type: "single", question: "572、电力电缆的常用敷设方式不包括()。", options: ["电缆沟敷设","脚手架敷设","穿管敷设"], answer: [1], explanation: "电力电缆不常用脚手架敷设"},
  {id: 1138, type: "single", question: "573、电流表的量程应()被测电路中实际电流的数值。", options: ["小于","等于","大于"], answer: [2], explanation: "电流表量程大于实际电流"},
  {id: 1139, type: "single", question: "574、补偿电容器组的投入与退出与系统的功率因数有关， 一般功率因数低于()时则应将电容器投入运行。", options: ["0.85","0.95","1"], answer: [0], explanation: "功率因数低0.85投电容"},
  {id: 1140, type: "single", question: "575、电机在运行时，用各方法监视电动机是为了()。", options: ["出现不正常现象时，及时处理","监视工人是否在工作","只为观察电动机是否正常工作"], answer: [0], explanation: "监视电机为及时处理异常"},
  {id: 1141, type: "judge", question: "734、为安全起见，更换熔断器时，最好断开负载。()", options: ["正确","错误"], answer: [1], explanation: "换熔断器不必断开负载"},
  {id: 1142, type: "judge", question: "733、检查电机的辅助设备及安装底座时，应检查熔断器及熔丝是否合格完好。", options: ["正确","错误"], answer: [0], explanation: "检查电机辅助设备查熔丝"},
  {id: 1143, type: "judge", question: "732、剩余电流动作保护装置主要用于1000V以下的低压系统。()", options: ["正确","错误"], answer: [0], explanation: "剩余电流装置用于低压系"},
  {id: 1144, type: "judge", question: "731、测量额定电压在500V以下的设备绝缘电阻时，可选用500V摇表来测量。", options: ["正确","错误"], answer: [0], explanation: "500V以下用500V摇表测绝缘"},
  {id: 1145, type: "judge", question: "730、作业过程中应保证身体健康，精神饱满，思想集中，避免发生触电。", options: ["正确","错误"], answer: [0], explanation: "作业保健康防触电"},
  {id: 1146, type: "judge", question: "729、在爆炸危险场所，应采用三相四线制单相三线制方式供电。()", options: ["正确","错误"], answer: [1], explanation: "爆炸场所供电方式错误"},
  {id: 1147, type: "judge", question: "728、电机在正常运行时，如闻到焦臭味，则说明电动机速度过快。()", options: ["正确","错误"], answer: [1], explanation: "电机焦臭非速度过快因"},
  {id: 1148, type: "judge", question: "727、移动式电气设备的电源一般采用架设或穿钢管保护的方式。", options: ["正确","错误"], answer: [0], explanation: "移动设备电源架管保护"},
  {id: 1149, type: "judge", question: "726、保护熔丝熔断后，未经查明原因之前，可以更换熔丝送电。()", options: ["正确","错误"], answer: [1], explanation: "保护熔丝熔断查明再送电"},
  {id: 1150, type: "single", question: "576、在实际应用中，常用()定为设备的额定容量，并标在铭牌上。", options: ["有功功率P","无功功率Q","视在功率S"], answer: [2], explanation: "设备额定容量是视在功率"},
  {id: 1151, type: "judge", question: "577、导线通过建筑物的伸缩缝或沉降缝时，导线应稍有余量;敷设线管时，应装补偿装置。", options: ["正确","错误"], answer: [0], explanation: "导线过缝应留量，线管装补偿"},
  {id: 1152, type: "judge", question: "578、不可用万用表欧姆档直接测量微安表检流计或电池的内阻。()", options: ["正确","错误"], answer: [0], explanation: "万用表欧姆档，不测微安表等内阻"},
  {id: 1153, type: "judge", question: "579、电容器放电的方法就是将其两端用导线连接。()", options: ["正确","错误"], answer: [1], explanation: "电容放电非连导"},
  {id: 1154, type: "judge", question: "580、因工外出期间，由于工作原因受到伤害或者发生事故下落不明的，应当及时治疗及查找，但不能认定为工伤。", options: ["正确","错误"], answer: [1], explanation: "因工外出受伤，属工伤范畴"},
  {id: 1155, type: "judge", question: "581、右手螺旋定则可以用已知电流方向来判断他所产生的磁场方向，也可以用已知磁场的方向来判断产生磁场的电流方向。", options: ["正确","错误"], answer: [0], explanation: "右手螺旋定则，知流判磁场等"},
  {id: 1156, type: "judge", question: "582、低压断路器一般由触点系统灭弧系统操作系统脱扣器及外壳等组成。()", options: ["正确","错误"], answer: [0], explanation: "低压断路器，由多部分组成"},
  {id: 1157, type: "judge", question: "583、机关学校企业住宅等建筑物内的插座回路不需要安装漏电保护装置。()", options: ["正确","错误"], answer: [1], explanation: "建筑物内插座，需装漏电保护"},
  {id: 1158, type: "judge", question: "584、当拉下总开关后，线路即视为无电。()", options: ["正确","错误"], answer: [1], explanation: "拉下总开关，线路未必无电"},

  {id: 1160, type: "judge", question: "724、低压集中补偿的低压电容器组，应专设开关并装在线路总开关的外侧，而不要装在低压母线上。()", options: ["正确","错误"], answer: [0], explanation: "低压电容组开关装线路侧"},
  {id: 1161, type: "judge", question: "723、生产经营场所和员工宿舍应当设有符合紧急疏散要求、标志明显、保持畅通的出口、疏散通道。禁止占用、锁闭、封堵生产经营场所或者员工宿舍的出口、疏散通道。", options: ["正确","错误"], answer: [0], explanation: "场所宿舍设疏散通禁占堵"},
  {id: 1162, type: "judge", question: "722、有电流流过的转子导体将在旋转磁场中受电磁力F的作用，其方向可用左手定则判定。", options: ["正确","错误"], answer: [0], explanation: "转子导体电磁力左手定"},
  {id: 1163, type: "judge", question: "721、启动是指电动机通电后转速从零开始逐渐加速到正常运转的过程。", options: ["正确","错误"], answer: [0], explanation: "电动机启动转速渐加速"},
  {id: 1164, type: "judge", question: "720、电阻的单位是欧姆，符号表示为Ω。", options: ["正确","错误"], answer: [0], explanation: "电阻单位欧姆符号Ω"},
  {id: 1165, type: "judge", question: "719、在我国，超高压送电线路基本上是架空敷设。", options: ["正确","错误"], answer: [0], explanation: "我国超高压送电多架空敷设"},
  {id: 1166, type: "judge", question: "718、县级以上各级人民政府及其有关部门对报告重大事故隐患或者举报安全生产违法行为的有功人员，给予奖励。", options: ["正确","错误"], answer: [0], explanation: "政府奖励重大隐患举报人"},
  {id: 1167, type: "judge", question: "717、电容器的放电负载不能装设熔断器或开关。()", options: ["正确","错误"], answer: [0], explanation: "电容器放电负载禁装熔丝开关"},
  {id: 1168, type: "judge", question: "585、高压水银灯的电压比较高，所以称为高压水银灯。()", options: ["正确","错误"], answer: [1], explanation: "高压水银灯，名不因其电压高"},

  {id: 1170, type: "judge", question: "587、二氧化碳灭火器带电灭火只适用于600V以下的线路，如果是10kV或者35kV线路，如要带电灭火只能选择干粉灭火器。()", options: ["正确","错误"], answer: [0], explanation: "二氧化碳灭火，适用电压范围"},

  {id: 1174, type: "judge", question: "591、在高压操作中，无遮栏作业人体或其所携带工具与带电体之间的距离应不少于0.7m。", options: ["正确","错误"], answer: [0], explanation: "高压无遮栏作业，距带电体要求"},
  {id: 1175, type: "judge", question: "592、在扑救带电火灾时，如果用喷雾水枪应将水枪喷嘴接地，并穿上绝缘靴和戴上绝缘手套，才可进行灭火操作。", options: ["正确","错误"], answer: [0], explanation: "带电灭火喷雾枪，接地并防护"},
  {id: 1176, type: "judge", question: "593、县级以上地方人民政府应当按照国家有关规定，对在生产安全事故应急救援中伤亡的人员及时给予救治和抚恤;符合烈士评定条件的，按照国家有关规定评定为烈士。", options: ["正确","错误"], answer: [0], explanation: "县级以上政府，救抚恤烈士评定"},
  {id: 1177, type: "judge", question: "716、新装电容器组投运前，应检查电容器的额定电压是否与电网电压相符。", options: ["正确","错误"], answer: [0], explanation: "新装电容器组投运前检查"},
  {id: 1178, type: "judge", question: "715、改变转子电阻调速这种方法只适用于绕线式异步电动机。()", options: ["正确","错误"], answer: [0], explanation: "绕线式电机可改变电阻调速"},
  {id: 1179, type: "judge", question: "714、进入陌生环境作业前，要先熟悉周围的疏散通道安全出口及楼梯方位。()", options: ["正确","错误"], answer: [0], explanation: "陌生环境作业前熟悉通道"},
  {id: 1180, type: "judge", question: "713、当事人对职业病诊断有异议的，可以向作出诊断的医疗卫生机构所在地地方人民政府卫生行政部门申请鉴定。", options: ["正确","错误"], answer: [0], explanation: "职业病诊断异议可申请鉴定"},
  {id: 1181, type: "judge", question: "712、安全生产工作必须坚持中国共产党的领导。", options: ["正确","错误"], answer: [0], explanation: "安全生产工作党的领导"},
  {id: 1182, type: "judge", question: "711、接触器运行维护内容包括打磨触头接触面、检查短路环是否断裂、清擦灭弧罩、做传动试验等。", options: ["正确","错误"], answer: [0], explanation: "接触器运行维护的要点"},
  {id: 1183, type: "judge", question: "710、移动式电气设备可以参考手持电动工具的有关要求进行使用。", options: ["正确","错误"], answer: [0], explanation: "移动设备参考手持要求"},
  {id: 1184, type: "judge", question: "709、电动机是一种将电能转化为机械能的动力设备，按电流性质可分为直流电动机和交流电动机。", options: ["正确","错误"], answer: [0], explanation: "电动机按电流性质分类"},
  {id: 1185, type: "judge", question: "708、生产经营单位的特种作业人员必须按照国家有关规定经专门的安全作业培训，取得相应资格，方可上岗作业。", options: ["正确","错误"], answer: [0], explanation: "特种作业人员需培训上岗"},
  {id: 1186, type: "judge", question: "594、交流接触器的辅助触头当电磁线圈得电时，动合触头先闭合，动断触头再断开。()", options: ["正确","错误"], answer: [1], explanation: "交流接触器，电磁线圈得电触头动作"},
  {id: 1187, type: "judge", question: "595、三相电动机的转子和定子要同时通电才能工作。()", options: ["正确","错误"], answer: [1], explanation: "三相电动机，转子定子不同时通电"},
  {id: 1188, type: "judge", question: "596、隔离开关的作用是承担接通和断开电流任务，将电路与电源隔开。()", options: ["正确","错误"], answer: [1], explanation: "隔离开关作用，非承担通断电流"},
  {id: 1189, type: "judge", question: "597、装有并联电阻的断路器不准使用手动操作机构进行合闸。", options: ["正确","错误"], answer: [0], explanation: "并联电阻断路器，手动合闸不行"},
  {id: 1190, type: "judge", question: "598、LED电光源和传统照明电光源相比，其特点为安全节能寿命长显色性好和价格低廉。()", options: ["正确","错误"], answer: [1], explanation: "LED光源特点，并非全是优点"},
  {id: 1191, type: "judge", question: "599、习近平总书记提出“人民至上，生命至上”这充分体现了总书记强烈的历史担当与深厚的人民情怀。", options: ["正确","错误"], answer: [0], explanation: "人民至上生命至上，体现担当情怀"},
  {id: 1192, type: "judge", question: "600、HK系列隔离开关适用于工业企业配电网中不频繁操作的场所，作为电气设备及线路的过载或短路保护设备。()", options: ["正确","错误"], answer: [1], explanation: "HK隔离开关用途，不是保护设备"},

  {id: 1194, type: "judge", question: "602、低压配电屏是按一定的接线方案将有关低压一二次设备组装起来，每一个主电路方案对应一个或多个辅助方案，从而简化了工程设计。()", options: ["正确","错误"], answer: [0], explanation: "低压配电屏作用，简化工程设计"},
  {id: 1195, type: "judge", question: "707、电容器组允许带电荷合闸。", options: ["正确","错误"], answer: [1], explanation: "电容器组禁止带电荷合闸"},
  {id: 1196, type: "judge", question: "706、从业人员发现事故隐患或者其他不安全因素，应当立即向现场安全生产管理人员或者本单位负责人报告;接到报告的人员应当及时予以处理。", options: ["正确","错误"], answer: [0], explanation: "人员发现隐患及时报告"},

  {id: 1198, type: "judge", question: "704、一般情况下，经过培训人员的触电事故发生率要少于未经过培训人员的触电事故发生率。", options: ["正确","错误"], answer: [0], explanation: "培训减少触电事故概率"},
  {id: 1199, type: "judge", question: "703、自动切换电器是依靠外力(如人力)操作，完成电路的接通或分断等操作，如接触器继电器等。", options: ["正确","错误"], answer: [1], explanation: "自动切换电器非靠外力"},
  {id: 1200, type: "judge", question: "702、保护接零是指低压配电系统中将电气设备外露可导电部分与供电变压器的零线直接相连接。", options: ["正确","错误"], answer: [0], explanation: "保护接零的正确定义"},
  {id: 1201, type: "judge", question: "701、习近平总书记指出，各级党委和政府要牢固树立安全发展理念，坚持人民利益至上，始终把安全生产放在首要位置，切实维护人民群众生命财产安全。", options: ["正确","错误"], answer: [0], explanation: "总书记谈安全生产理念"},
  {id: 1202, type: "judge", question: "700、人员密集场所发生火灾，该场所的现场工作人员应当立即组织、引导在场人员进行灭火，控制火情，不得擅自疏散。", options: ["正确","错误"], answer: [1], explanation: "人密火灾先疏散"},
  {id: 1203, type: "judge", question: "699、露天照明装置应采用防水器材。()", options: ["正确","错误"], answer: [0], explanation: "露天照明要用防水器材"},
  {id: 1204, type: "judge", question: "603、因闻到焦臭味而停止运行的电动机，必须找出原因后才能再通电使用。()", options: ["正确","错误"], answer: [0], explanation: "电机有焦味，查明再通电"},
  {id: 1205, type: "judge", question: "604、配电装置按电气设备安装地点不同分为户内和户外配电装置。", options: ["正确","错误"], answer: [0], explanation: "配电装置分两类，户内户外区分"},
  {id: 1206, type: "judge", question: "605、低压电网采用绝缘导线代替裸导线，可以大大提高安全供电的可靠性。()", options: ["正确","错误"], answer: [0], explanation: "绝缘导线代裸线，提高供电可靠"},
  {id: 1207, type: "judge", question: "606、张某在生产作业过程中违反安全生产管理制度，导致发生机械伤害事故，虽然造成3人重伤，但无人死亡;依据刑法及有关规定，张某不会被追究刑事责任。", options: ["正确","错误"], answer: [1], explanation: "危险场所电动具，防爆措施必备"},
  {id: 1208, type: "judge", question: "607、《安全生产法》明确，应当把保护人民生命安全摆在首位，树牢安全发展理念。", options: ["正确","错误"], answer: [0], explanation: "电路功率平衡，电源负载内阻"},
  {id: 1209, type: "judge", question: "608、摇表摇动后产生的电压， L端为负极， E端为正极。", options: ["正确","错误"], answer: [0], explanation: "I类移动设备，需装漏电保护"},
  {id: 1210, type: "judge", question: "609、低压架空线路绝缘子，是用来固定导线，并使导线与导线之间，导线与横担之间，导线与电杆之间保持绝缘。()", options: ["正确","错误"], answer: [0], explanation: "电桥并非全测直流电阻"},
  {id: 1211, type: "judge", question: "610、在有爆炸和火灾危险场所使用手持式或移动式电动工具时，必须采用有防爆措施的电动工具。", options: ["正确","错误"], answer: [0], explanation: "事故报告要及时，不得迟漏谎报"},
  {id: 1212, type: "judge", question: "611、在一个电路中，电源产生的功率和负载消耗功率以及内阻损耗的功率是平衡的。", options: ["正确","错误"], answer: [0], explanation: "电路功率是平衡的"},
  {id: 1213, type: "judge", question: "698、验电是保证电气作业安全的技术措施之一。()", options: ["正确","错误"], answer: [0], explanation: "验电属电气安全技术措施"},
  {id: 1214, type: "judge", question: "697、速度继电器由定子、转子、触点、同步电机等部分组成。", options: ["正确","错误"], answer: [1], explanation: "速度继电器组成部分判断"},
  {id: 1215, type: "judge", question: "696、在TN-C、TN-C-S系统的中性线上应装设熔断器。", options: ["正确","错误"], answer: [1], explanation: "TN系统中性线不装熔断器"},
  {id: 1216, type: "judge", question: "695、生产经营单位的普通从业人员，无权了解其作业场所和工作岗位存在的危险因素防范措施及事故应急措施，也不必要对本单位的安全生产工作提出建议。()", options: ["正确","错误"], answer: [1], explanation: "普通员工有权了解提建议"},
  {id: 1217, type: "judge", question: "694、脱离电源后，触电者神志清醒，应让触电者来回走动，加强血液循环。()", options: ["正确","错误"], answer: [1], explanation: "触电清醒不应来回走动"},
  {id: 1218, type: "judge", question: "693、为加强防盗工作，企业可以对人员密集场所的窗户加设封闭式防盗窗。", options: ["正确","错误"], answer: [1], explanation: "企业不能随意加设防盗窗"},
  {id: 1219, type: "judge", question: "692、对可能发生急性职业损伤的有毒、有害工作场所，用人单位应当设置报警装置，配置现场急救用品、冲洗设备、应急撤离通道和必要的泄险区。", options: ["正确","错误"], answer: [0], explanation: "有害场所应设急救等设施"},
  {id: 1220, type: "judge", question: "691、电容器发生对地绝缘击穿，电容器的损失角正切值增大，箱壳膨胀及开路等故障，可自行修理。()", options: ["正确","错误"], answer: [1], explanation: "电容故障不能自行修理"},
  {id: 1221, type: "judge", question: "690、用钳表测量电流时，尽量将导线置于钳口铁芯中间，以减少测量误差。", options: ["正确","错误"], answer: [0], explanation: "钳表测流导线放铁芯中间"},
  {id: 1222, type: "judge", question: "612、属于I类的移动式电气设备及手持式电动工具，可不安装剩余电流保护装置。()", options: ["正确","错误"], answer: [1], explanation: "电路短路非电流不通"},
  {id: 1223, type: "judge", question: "613、所有的电桥均是测量直流电阻的。", options: ["正确","错误"], answer: [1], explanation: ""},
  {id: 1224, type: "judge", question: "614、依据《生产安全事故报告和调查处理条例》，事故报告应当及时准确完整，任何单位和个人对事故不得迟报漏报谎报或者瞒报。", options: ["正确","错误"], answer: [0], explanation: ""},
  {id: 1225, type: "judge", question: "615、照明线路的接地点多发生在穿墙部位和靠近墙壁或天花板等部位。", options: ["正确","错误"], answer: [0], explanation: ""},
  {id: 1226, type: "judge", question: "616、电路短路状态是指电流不能构成通路。()", options: ["正确","错误"], answer: [1], explanation: "短路电流能通路"},
  {id: 1227, type: "judge", question: "617、移动式电气设备的电源线单相用三芯电缆，三相用四芯电缆。()", options: ["正确","错误"], answer: [0], explanation: "移动设备电源线，单三三相记清"},
  {id: 1228, type: "judge", question: "618、对从事接触职业病危害因素的特种作业人员，用人单位应当按照国家颁发的行政法规规定，组织上岗前、在岗期间和离岗时的职业健康检查，并将检查结果书面告知劳动者。", options: ["正确","错误"], answer: [0], explanation: "接触危害特种工，健康检查要合规"},
  {id: 1229, type: "judge", question: "619、进户线选择铜芯绝缘线的最小截面积不得小于2.5mm2。", options: ["正确","错误"], answer: [0], explanation: "进户线选铜芯线，最小截面2.5平"},
  {id: 1230, type: "judge", question: "620、LED光的强弱与电流有关。", options: ["正确","错误"], answer: [0], explanation: "LED光强与电流，二者关系要记全"},
  {id: 1231, type: "judge", question: "689、使用改变磁极对数来调速的电机一般都是绕线式电动机。()", options: ["正确","错误"], answer: [1], explanation: "变磁极对数调速不是绕线电机"},
  {id: 1232, type: "judge", question: "688、万用表使用后，转换开关可置于任意位置。", options: ["正确","错误"], answer: [1], explanation: "万用表后开关不能任意置"},
  {id: 1233, type: "judge", question: "687、照明220V灯具安装在潮湿危险场所及户外时不应低于2.5m。", options: ["正确","错误"], answer: [0], explanation: "潮湿户外220V灯具装2.5m以上"},
  {id: 1234, type: "judge", question: "686、摇表可以直接对被测设备进行绝缘测量。", options: ["正确","错误"], answer: [1], explanation: "摇表不能直接测绝缘"},
  {id: 1235, type: "judge", question: "685、发现有人触电后，应立即通知医院派救护车来抢救，在医生来到前，现场人员不能对触电者进行抢救，以免造成二次伤害。()", options: ["正确","错误"], answer: [1], explanation: "触电后现场人员能急救"},
  {id: 1236, type: "judge", question: "684、为改善电动机的启动及运行性能，笼形异步电动机转子铁芯一般采用直槽结构。()", options: ["正确","错误"], answer: [1], explanation: "笼形电机转子不用直槽结构"},
  {id: 1237, type: "judge", question: "683、单相220V电源供电的电气设备，应选用三极式漏电保护装置。()", options: ["正确","错误"], answer: [1], explanation: "单相220V不用三极漏电保"},
  {id: 1238, type: "judge", question: "682、绝缘材料就是指绝对不导电的材料。()", options: ["正确","错误"], answer: [1], explanation: "绝缘材料并非绝对不导电"},
  {id: 1239, type: "judge", question: "681、照明电路常见的故障主要有断路短路和漏电三种。", options: ["正确","错误"], answer: [0], explanation: "照明故障有断路短路漏电"},
  {id: 1240, type: "judge", question: "621、按规定，接地线必须是不小于截面积25mm² 的裸铜软线制成。", options: ["正确","错误"], answer: [0], explanation: "接地线规25平，裸铜软线要记清"},
  {id: 1241, type: "judge", question: "622、生产经营单位发现从业人员的身体、心理状况和行为习惯出现异常时，应加强对从业人员的心理疏导、精神慰藉。", options: ["正确","错误"], answer: [0], explanation: "员工异常要关注，心理慰藉不能忽"},
  {id: 1242, type: "judge", question: "623、测量电机的对地绝缘电阻和相间绝缘电阻，常使用兆欧表，而不能使用万用表。", options: ["正确","错误"], answer: [0], explanation: "测电机绝缘电阻，兆欧表来不能误"},
  {id: 1243, type: "judge", question: "624、感知概率为50%时，成年男性的平均感知电流值约为1.1mA，最小为0.5mA，成年女性约为0.6mA。()", options: ["正确","错误"], answer: [1], explanation: "男女感知电流不同"},
  {id: 1244, type: "judge", question: "625、测试对地电压为50V以上的带电设备时，氖泡式低压验电器就应显示有电。", options: ["正确","错误"], answer: [1], explanation: "50V上验电器，显示有电不一定"},
  {id: 1245, type: "judge", question: "626、“无功”的含义是“交换”的意思，而不是“消耗”或“无用”，是相对“有功”而言的。", options: ["正确","错误"], answer: [0], explanation: "无功含义相对有，交换非耗要记熟"},
  {id: 1246, type: "judge", question: "627、电动机定额工作制分为连续定额、短时定额、断续定额。", options: ["正确","错误"], answer: [0], explanation: "电动机工作制，连续短时断续记"},
  {id: 1247, type: "judge", question: "628、生产经营单位必须为从业人员提供符合国家标准或者行业标准的劳动防护用品，并监督教育从业人员按照使用规则佩戴使用。()", options: ["正确","错误"], answer: [0], explanation: "劳保用品要合规，监督佩戴不能推"},
  {id: 1248, type: "judge", question: "629、TN-C-S系统是干线部分保护零线与工作零线完全共用的系统。", options: ["正确","错误"], answer: [1], explanation: "TN-C-S系统别，干线零火不共用"},
  {id: 1249, type: "judge", question: "680、事故照明不允许和其他照明共用同一线路。", options: ["正确","错误"], answer: [0], explanation: "事故照明不与他照共线"},
  {id: 1250, type: "judge", question: "679、单相异步电动机采用三相交流电源，电动机功率一般都比较小。()", options: ["正确","错误"], answer: [1], explanation: "单相异步不用三相交流电源"},
  {id: 1251, type: "judge", question: "678、部分电路欧姆定律表明，当电流一定时，电阻大小与电阻两端的电压成正比。", options: ["正确","错误"], answer: [1], explanation: "电流一定，电压电阻不成正比"},
  {id: 1252, type: "judge", question: "677、为了仔细观察电力设备的运行状况，巡视人员可以越过设备的围栏。()", options: ["正确","错误"], answer: [1], explanation: "电力设备巡视不能越过围栏"},
  {id: 1253, type: "judge", question: "676、生产经营单位应当具备安全生产法和有关法律、行政法规和国家标准或者行业标准规定的安全生产条件;不具备安全生产条件的，不得从事生产经营活动。", options: ["正确","错误"], answer: [0], explanation: "单位需具备安全生产条件"},
  {id: 1254, type: "judge", question: "675、一般情况下，接地电网的单相触电比不接地电网的危险性小。", options: ["正确","错误"], answer: [1], explanation: "接地电网单相触电危险性大"},
  {id: 1255, type: "judge", question: "674、根据熔断器的保护特性可知，熔体通过的电流越大，熔化时间越长。", options: ["正确","错误"], answer: [1], explanation: "熔体电流大，熔化时间短"},
  {id: 1256, type: "judge", question: "673、一般电动机电路上应有短路、过载、欠压、断相保护。", options: ["正确","错误"], answer: [0], explanation: "电动机电路需多种保护"},
  {id: 1257, type: "judge", question: "672、导线连接后接头与绝缘层的距离越小越好。()", options: ["正确","错误"], answer: [0], explanation: "导线接头与绝缘层距离越小越好"},
  {id: 1258, type: "judge", question: "630、多用螺钉旋具的规格是以它的全长(手柄加旋杆)表示。", options: ["正确","错误"], answer: [0], explanation: "多用旋具规格定，全长表示要记清"},
  {id: 1259, type: "judge", question: "631、在居民区，3kV以下架空电力线路导线与地面之间的最小距离为6.0m。", options: ["正确","错误"], answer: [0], explanation: "居民区架空线，离地距离6.0米"},
  {id: 1260, type: "judge", question: "632、用万用表R×1kΩ欧姆档测量二极管时，红表笔接一只脚，黑表笔接另一只脚测得的电阻值约为几百欧姆，反向测量时电阻值很大，则该二极管是好的。", options: ["正确","错误"], answer: [0], explanation: "万用表测二极管，阻值判断好坏明"},
  {id: 1261, type: "judge", question: "633、剥线钳是用来剥削小导线头部表面绝缘层的专用工具。()", options: ["正确","错误"], answer: [0], explanation: "剥线钳剥绝缘层，专用工具要记准"},
  {id: 1262, type: "judge", question: "634、在单相电度表前允许安装开关，以方便用户维护电度表。", options: ["正确","错误"], answer: [1], explanation: "单相电度表前关，安装规定不能乱"},
  {id: 1263, type: "judge", question: "635、在电路中A、B两点的电压用UAB表示，则UAB=UB-UA。", options: ["正确","错误"], answer: [1], explanation: "电路两点电压算，公式别把顺序换"},
  {id: 1264, type: "judge", question: "636、按规范要求，穿管绝缘导线用铜芯线时，截面积不得小于1mm2。()", options: ["正确","错误"], answer: [0], explanation: "穿管铜芯线截面，不得小于1平记牢"},
  {id: 1265, type: "judge", question: "637、在电压低于额定值的一定比例后能自动断电的称为欠压保护。", options: ["正确","错误"], answer: [0], explanation: "欠压保护能自动断电，记住啦"},
  {id: 1266, type: "judge", question: "638、在生产作业中违反有关安全管理的规定，因而发生重大伤亡事故或者造成其他严重后果的，对负有组织指挥或者管理职责的负责人管理人员追究刑事责任，但基层员工可以不必担责。", options: ["正确","错误"], answer: [1], explanation: "生产事故基层员工也可能担责"},
  {id: 1267, type: "judge", question: "671、万用表在测量电阻时，指针指在刻度盘中间最准确。()", options: ["正确","错误"], answer: [0], explanation: "万用表测电阻，指针中最准"},
  {id: 1268, type: "judge", question: "670、电力线路杆塔按结构材料不同，可分为木结构钢筋混凝土结构金属结构等杆塔。()", options: ["正确","错误"], answer: [0], explanation: "杆塔按材料分木、钢混、金属等"},
  {id: 1269, type: "judge", question: "669、电工钳电工刀螺丝刀是常用电工基本工具。()", options: ["正确","错误"], answer: [0], explanation: "电工钳刀螺丝刀，常用基本工具"},
  {id: 1270, type: "judge", question: "668、依据《生产安全事故报告和调查处理条例》，事故发生后，有关单位和人员应当妥善保护事故现场以及相关信息，任何单位和个人不得破坏事故现场毁灭相关证据。", options: ["正确","错误"], answer: [0], explanation: "事故后保护现场和证据"},
  {id: 1271, type: "judge", question: "667、熔断器的额定电压是从过载角度出发作出的规定。()", options: ["正确","错误"], answer: [1], explanation: "熔断器额定电压非从过载定"},
  {id: 1272, type: "judge", question: "666、断路器可分为框架式和塑料外壳式。()", options: ["正确","错误"], answer: [0], explanation: "断路器分框架和塑料外壳式"},
  {id: 1273, type: "judge", question: "665、频率的自动调节补偿是热继电器的一个功能。()", options: ["正确","错误"], answer: [1], explanation: "热继电器无频率自动补偿功能"},
  {id: 1274, type: "judge", question: "664、电机在检修后，经各项检查合格，即可对电机进行空载试验和短路试验。", options: ["正确","错误"], answer: [0], explanation: "电机检修后，可做空载短路试验"},
  {id: 1275, type: "judge", question: "663、视在功率S常用来表征设备的额定容量，并标在铭牌上。", options: ["正确","错误"], answer: [0], explanation: "视在功率表容量，常标在铭牌上"},
  {id: 1276, type: "judge", question: "639、对电机轴承润滑的检查，可通电转动电动机转轴，看是否转动灵活，听有无异声。()", options: ["正确","错误"], answer: [1], explanation: "电机轴承润滑检查，不能通电"},
  {id: 1277, type: "judge", question: "640、电子镇流器的功率因数高于电感式镇流器。()", options: ["正确","错误"], answer: [0], explanation: "电子镇流器功率因数高"},

// ============================================================================
//  应用状态
// ============================================================================
let examState = null;
let timerInterval = null;
let flashcardState = null;  // { cards, currentIndex, isFlipped, knownIds, learningIds }

// ============================================================================
//  localStorage 工具
// ============================================================================
const LS_FLASHCARDS = 'lowvolt_flashcards';
const LS_HISTORY = 'lowvolt_exam_history';

function getFlashcards() {
  try { return JSON.parse(localStorage.getItem(LS_FLASHCARDS) || '[]'); }
  catch(e) { return []; }
}
function saveFlashcards(cards) {
  try { localStorage.setItem(LS_FLASHCARDS, JSON.stringify(cards)); }
  catch(e) { /* quota exceeded, silently fail */ }
}
function getExamHistory() {
  try { return JSON.parse(localStorage.getItem(LS_HISTORY) || '[]'); }
  catch(e) { return []; }
}
function saveExamResult(result) {
  try {
    const history = getExamHistory();
    history.push(result);
    if (history.length > 50) history.splice(0, history.length - 50);  // keep last 50
    localStorage.setItem(LS_HISTORY, JSON.stringify(history));
  } catch(e) { /* ignore */ }
}
function updateHomeDeckUI() {
  const cards = getFlashcards();
  const info = document.getElementById('homeDeckInfo');
  const btn = document.getElementById('btnFlashcardHome');
  const count = document.getElementById('homeDeckCount');
  if (cards.length > 0) {
    info.classList.remove('hidden');
    btn.classList.remove('hidden');
    count.textContent = cards.length + ' 張';
  } else {
    info.classList.add('hidden');
    btn.classList.add('hidden');
  }
}

// ============================================================================
//  工具函数
// ============================================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(seconds) {
  const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
  const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

// ============================================================================
//  视图切换
// ============================================================================
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const viewMap = { home: 'home-view', exam: 'exam-view', result: 'result-view', review: 'review-view', flashcard: 'flashcard-view' };
  const el = document.getElementById(viewMap[name]);
  if (el) el.classList.add('active');
  if (name === 'home') updateHomeDeckUI();
}

// ============================================================================
//  考试启动
// ============================================================================
function startExam() {
  stopTimer();
  document.getElementById('timer').textContent = '⏱ 00:00:00';

  // Separate question types
  const singles = QUESTION_BANK.filter(q => q.type === 'single');
  const judges = QUESTION_BANK.filter(q => q.type === 'judge');
  const multis = QUESTION_BANK.filter(q => q.type === 'multi');

  // Aim for ~50 single/multi + ~50 judge per exam
  const halfCount = 50;
  let selected;

  if (singles.length >= halfCount && judges.length >= halfCount) {
    const selectedSingles = shuffle(singles).slice(0, halfCount);
    const selectedJudges = shuffle(judges).slice(0, halfCount);
    const selectedMultis = multis.length > 0 ? shuffle(multis).slice(0, Math.min(multis.length, 5)) : [];
    selected = shuffle([...selectedSingles, ...selectedJudges, ...selectedMultis]);
  } else if (singles.length >= 50 && judges.length >= 50) {
    selected = shuffle([...shuffle(singles).slice(0, 50), ...shuffle(judges).slice(0, 50)]);
  } else {
    // Fallback: just pick 100 random from all
    selected = QUESTION_BANK.length <= 100
      ? shuffle(QUESTION_BANK)
      : shuffle(QUESTION_BANK).slice(0, 100);
  }

  examState = {
    questions: selected.map(q => ({
      ...q,
      userAnswers: [],
      marked: false
    })),
    currentIndex: 0,
    startTime: null,
    elapsed: 0,
    submitted: false,
    wrongQuestions: [],
    score: 0
  };

  showView('exam');
  startTimer();
  renderExam();
}

// ============================================================================
//  计时
// ============================================================================
function startTimer() {
  if (!examState) return;
  examState.startTime = Date.now() - examState.elapsed * 1000;
  timerInterval = setInterval(() => {
    examState.elapsed = Math.floor((Date.now() - examState.startTime) / 1000);
    document.getElementById('timer').textContent = '⏱ ' + formatTime(examState.elapsed);
  }, 250);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ============================================================================
//  渲染题目
// ============================================================================
function renderExam() {
  const q = examState.questions[examState.currentIndex];
  const body = document.getElementById('examBody');
  const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
  const isMulti = q.type === 'multi';
  const isJudge = q.type === 'judge';

  let typeLabel, typeClass;
  if (isMulti) { typeLabel = '多选题'; typeClass = ' multi'; }
  else if (isJudge) { typeLabel = '判断题'; typeClass = ' judge'; }
  else { typeLabel = '单选题'; typeClass = ''; }

  const optionsHTML = q.options.map((opt, i) => {
    const selected = q.userAnswers.includes(i);
    const selClass = selected ? ' selected' : '';
    const letterClass = isMulti ? 'option-letter square' : 'option-letter';
    return `<div class="option-item${selClass}" onclick="selectOption(${i})">
      <span class="${letterClass}">${letters[i]}</span>
      ${opt}
    </div>`;
  }).join('');

  body.innerHTML = `
    <div class="question-type${typeClass}">${typeLabel}</div>
    <div class="question-text">${examState.currentIndex + 1}. ${q.question}</div>
    <div class="options-list">${optionsHTML}</div>
  `;

  document.getElementById('progress').textContent =
    `第 ${examState.currentIndex + 1} / ${examState.questions.length} 题`;
  document.getElementById('btnPrev').disabled = examState.currentIndex === 0;
  document.getElementById('btnNext').disabled = examState.currentIndex === examState.questions.length - 1;
  updateMarkButton();
  renderAnswerCard();
}

// ============================================================================
//  选项交互
// ============================================================================
function selectOption(optIdx) {
  const q = examState.questions[examState.currentIndex];
  if (q.type === 'single' || q.type === 'judge') {
    // 单选 & 判断：点击即替换，只能选一个
    q.userAnswers = [optIdx];
  } else {
    // 多选：点击切换勾选
    const pos = q.userAnswers.indexOf(optIdx);
    if (pos >= 0) q.userAnswers.splice(pos, 1);
    else q.userAnswers.push(optIdx);
  }
  renderExam();
}

// ============================================================================
//  导航
// ============================================================================
function prevQuestion() {
  if (examState.currentIndex > 0) {
    examState.currentIndex--;
    renderExam();
  }
}

function nextQuestion() {
  if (examState.currentIndex < examState.questions.length - 1) {
    examState.currentIndex++;
    renderExam();
  }
}

function jumpTo(index) {
  examState.currentIndex = index;
  renderExam();
}

// ============================================================================
//  标记
// ============================================================================
function toggleMark() {
  const q = examState.questions[examState.currentIndex];
  q.marked = !q.marked;
  updateMarkButton();
  renderAnswerCard();
}

function updateMarkButton() {
  const q = examState.questions[examState.currentIndex];
  document.getElementById('btnMark').textContent = q.marked ? '🔖 取消标记' : '🔖 标记';
}

// ============================================================================
//  答题卡
// ============================================================================
function renderAnswerCard() {
  const card = document.getElementById('answerCard');
  const answered = examState.questions.filter(q => q.userAnswers.length > 0).length;
  const marked = examState.questions.filter(q => q.marked).length;

  const gridHTML = examState.questions.map((q, i) => {
    let cls = 'grid-item';
    const isCurrent = i === examState.currentIndex;
    const isAnswered = q.userAnswers.length > 0;
    const isMarked = q.marked;

    if (isCurrent && isMarked) cls += ' marked-current';
    else if (isCurrent) cls += ' current';
    else if (isMarked) cls += ' marked';
    else if (isAnswered) cls += ' answered';

    const label = String(i + 1);
    const title = `第${i + 1}题${q.marked ? ' [已标记]' : ''}${isAnswered ? '' : ' [未答]'}`;
    return `<span class="${cls}" onclick="jumpTo(${i})" title="${title}">${label}</span>`;
  }).join('');

  card.innerHTML = `
    <div class="answer-card-title">📋 答题卡</div>
    <div class="answer-card-stats">已答 ${answered} · 标记 ${marked}</div>
    <div class="grid">${gridHTML}</div>
    <div class="legend">
      <span>🟢 已答</span><br>
      <span>🟡 标记</span><br>
      <span>🔵 当前</span><br>
      <span>⬜ 未答</span>
    </div>
  `;
}

// ============================================================================
//  交卷确认
// ============================================================================
function showSubmitModal() {
  const answered = examState.questions.filter(q => q.userAnswers.length > 0).length;
  const unAnswered = examState.questions.length - answered;
  const marked = examState.questions.filter(q => q.marked).length;
  document.getElementById('submitInfo').innerHTML =
    `已答 <strong>${answered}</strong> 题<br>未答 <strong>${unAnswered}</strong> 题<br>标记 <strong>${marked}</strong> 题`;
  document.getElementById('submitModal').classList.add('active');
}

function hideSubmitModal() {
  document.getElementById('submitModal').classList.remove('active');
}

// ============================================================================
//  评分
// ============================================================================
function submitExam() {
  stopTimer();
  hideSubmitModal();

  let correct = 0;
  const wrongQuestions = [];

  examState.questions.forEach(q => {
    const userSet = new Set(q.userAnswers);
    const answerSet = new Set(q.answer);
    const isCorrect = userSet.size === answerSet.size && [...userSet].every(v => answerSet.has(v));
    if (isCorrect) {
      correct++;
    } else {
      wrongQuestions.push(q);
    }
  });

  examState.submitted = true;
  examState.wrongQuestions = wrongQuestions;
  examState.score = correct;

  const total = examState.questions.length;
  const wrongCount = total - correct;
  const accuracy = Math.round((correct / total) * 100);

  document.getElementById('scoreValue').textContent = correct;
  document.getElementById('scoreLabel').textContent = `分（满分 ${total}）`;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrongCount;
  document.getElementById('accuracy').textContent = accuracy + '%';
  document.getElementById('totalTime').textContent = formatTime(examState.elapsed);

  const circle = document.getElementById('scoreCircle');
  circle.classList.toggle('fail', accuracy < 80);

  const btnReview = document.getElementById('btnReview');
  if (wrongCount === 0) {
    btnReview.classList.add('hidden');
  } else {
    btnReview.classList.remove('hidden');
  }

  // 保存成績記錄
  saveExamResult({
    date: new Date().toISOString(),
    score: correct, total, accuracy, elapsed: examState.elapsed,
    wrongIds: wrongQuestions.map(q => q.id)
  });

  showView('result');
  updateHomeDeckUI();
}

// ============================================================================
//  错题回顾
// ============================================================================
function showReview() {
  const wrong = examState.wrongQuestions;
  document.getElementById('reviewCount').textContent = wrong.length;

  const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
  const body = document.getElementById('reviewBody');

  if (wrong.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary);font-size:16px;">🎉 全部正确，没有错题！</div>';
    showView('review');
    return;
  }

  const existingCards = getFlashcards();
  const existingIds = new Set(existingCards.map(c => c.id));

  body.innerHTML = wrong.map((q, i) => {
    const userSet = new Set(q.userAnswers);
    const answerSet = new Set(q.answer);
    const userPickedNone = q.userAnswers.length === 0;
    const alreadyInDeck = existingIds.has(q.id);

    const optionsHtml = q.options.map((opt, idx) => {
      const isUserPick = userSet.has(idx);
      const isCorrect = answerSet.has(idx);
      let cls = 'neutral';
      let tag = '';
      if (isUserPick && isCorrect) {
        cls = 'correct-pick';
        tag = '✅ 你的选择（正确）';
      } else if (isUserPick && !isCorrect) {
        cls = 'wrong-pick';
        tag = '❌ 你的选择';
      } else if (!isUserPick && isCorrect) {
        cls = 'correct-pick';
        tag = '✅ 正确答案';
      }
      return `<div class="opt-row ${cls}">${letters[idx]}: ${opt}${tag ? `<span class="tag">${tag}</span>` : ''}</div>`;
    }).join('');

    const extraLine = userPickedNone
      ? '<div style="color:var(--neon-pink);font-size:14px;margin-bottom:6px;">⚠️ 未作答</div>'
      : '';

    const exp = q.explanation ? `<div class="explanation">💡 ${q.explanation}</div>` : '';
    const fcBtn = alreadyInDeck
      ? '<button class="btn btn-sm btn-secondary" disabled>✅ 已加入閃卡</button>'
      : `<button class="btn btn-sm btn-purple" onclick="addSingleToFlashcards(${q.id})">➕ 加入閃卡</button>`;
    return `<div class="review-item" id="reviewItem${q.id}">
      <div class="q-text"><strong>${i + 1}.</strong> ${q.question}</div>
      <div class="options-list">${optionsHtml}</div>
      ${extraLine}
      ${exp}
      <div class="fc-add-row">${fcBtn}</div>
    </div>`;
  }).join('');

  showView('review');
}

// ============================================================================
//  键盘快捷键
// ============================================================================
document.addEventListener('keydown', (e) => {
  // 弹窗打开时只响应 ESC
  const modal = document.getElementById('submitModal');
  if (modal.classList.contains('active')) {
    if (e.key === 'Escape') hideSubmitModal();
    return;
  }

  // 不在考试状态则忽略
  if (!examState || examState.submitted) return;

  const q = examState.questions[examState.currentIndex];
  const letters = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

  const letterIdx = letters.indexOf(e.key.toLowerCase());
  if (letterIdx >= 0 && letterIdx < q.options.length) {
    e.preventDefault();
    selectOption(letterIdx);
    return;
  }

  switch (e.key) {
    case 'ArrowLeft':  e.preventDefault(); prevQuestion(); break;
    case 'ArrowRight': e.preventDefault(); nextQuestion(); break;
    case 'm': case 'M': e.preventDefault(); toggleMark(); break;
  }
});
// ============================================================================
//  閃卡牌組管理
// ============================================================================
function addSingleToFlashcards(qId) {
  const q = examState.wrongQuestions.find(w => w.id === qId);
  if (!q) return;
  const cards = getFlashcards();
  if (cards.some(c => c.id === qId)) return;
  cards.push({
    id: q.id, type: q.type, question: q.question,
    options: q.options, answer: q.answer, explanation: q.explanation || ''
  });
  saveFlashcards(cards);
  var btn = document.querySelector('#reviewItem' + qId + ' .fc-add-row button');
  if (btn) { btn.textContent = '✅ 已加入閃卡'; btn.className = 'btn btn-sm btn-secondary'; btn.disabled = true; }
  updateHomeDeckUI();
}

function addAllWrongToFlashcards() {
  const wrong = examState.wrongQuestions;
  if (!wrong || wrong.length === 0) return;
  const cards = getFlashcards();
  const existingIds = new Set(cards.map(c => c.id));
  let added = 0;
  wrong.forEach(q => {
    if (!existingIds.has(q.id)) {
      cards.push({
        id: q.id, type: q.type, question: q.question,
        options: q.options, answer: q.answer, explanation: q.explanation || ''
      });
      existingIds.add(q.id);
      added++;
    }
  });
  if (added > 0) { saveFlashcards(cards); showReview(); }
  updateHomeDeckUI();
}

// ============================================================================
//  閃卡複習
// ============================================================================
function startFlashcardReview() {
  const cards = getFlashcards();
  if (cards.length === 0) {
    alert('閃卡牌組為空！請先在錯題回顧中加入題目。');
    return;
  }
  flashcardState = {
    cards: shuffle(cards),
    currentIndex: 0,
    isFlipped: false,
    knownIds: [],
    learningIds: []
  };
  showView('flashcard');
  renderFlashcard();
}

function renderFlashcard() {
  const st = flashcardState;
  if (!st || st.cards.length === 0) {
    document.getElementById('fcContainer').innerHTML = '<div class="fc-empty"><div class="icon">🃏</div><p>牌組為空</p><button class="btn btn-primary" onclick="showView(\'home\')">返回首頁</button></div>';
    document.getElementById('fcActions').classList.add('hidden');
    document.getElementById('fcProgress').textContent = '';
    document.getElementById('fcStats').textContent = '0 張';
    return;
  }
  if (st.currentIndex >= st.cards.length) {
    const total = st.cards.length;
    const known = st.knownIds.length;
    document.getElementById('fcContainer').innerHTML = '<div class="fc-empty"><div class="icon">🎉</div><p style="font-size:18px;color:var(--neon-cyan);">複習完成！</p><p style="color:var(--text-secondary);margin-top:8px;">✅ 熟練 ' + known + ' 題 &nbsp;|&nbsp; 📝 待加強 ' + (total - known) + ' 題</p><div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"><button class="btn btn-primary" onclick="startFlashcardReview()">🔄 再來一輪</button><button class="btn btn-secondary" onclick="showView(\'home\')">🏠 返回首頁</button></div></div>';
    document.getElementById('fcActions').classList.add('hidden');
    document.getElementById('fcProgress').textContent = '';
    document.getElementById('fcStats').textContent = '✅ ' + known + ' / ' + total;
    return;
  }
  document.getElementById('fcActions').classList.remove('hidden');
  st.isFlipped = false;
  const card = st.cards[st.currentIndex];
  const total = st.cards.length;
  let typeLabel = card.type === 'multi' ? '多選題' : card.type === 'judge' ? '判斷題' : '單選題';
  document.getElementById('fcStats').textContent = '📋 ' + (st.currentIndex + 1) + ' / ' + total + '  |  ✅' + st.knownIds.length + '  📝' + st.learningIds.length;
  document.getElementById('fcProgress').textContent = '⬅ 點擊卡片翻轉查看答案 ➡';
  const correctAnswer = card.answer.map(function(a) { return String.fromCharCode(65 + a); }).join(', ');
  const optionsPreview = card.options ? card.options.map(function(o, i) { return String.fromCharCode(65 + i) + '. ' + o; }).join('<br>') : '';
  document.getElementById('fcContainer').innerHTML = '<div class="flashcard" id="fcCard" onclick="flipCard()"><div class="fc-front"><span class="fc-type-badge">' + typeLabel + '</span><span class="fc-label">📝 問題</span><p class="fc-question">' + card.question + '</p>' + (optionsPreview ? '<div style="font-size:13px;color:var(--text-muted);margin-top:12px;line-height:1.8;text-align:left;">' + optionsPreview + '</div>' : '') + '<p class="fc-hint">👆 點擊翻轉</p></div><div class="fc-back"><span class="fc-label">✅ 正確答案</span><p class="fc-answer">' + correctAnswer + '</p>' + (card.explanation ? '<p class="fc-explanation">💡 ' + card.explanation + '</p>' : '') + '</div></div>';
}

function flipCard() {
  if (!flashcardState) return;
  const card = document.getElementById('fcCard');
  if (!card) return;
  flashcardState.isFlipped = !flashcardState.isFlipped;
  if (flashcardState.isFlipped) {
    card.classList.add('flipped');
    document.getElementById('fcProgress').textContent = '👆 選擇是否已掌握';
  } else {
    card.classList.remove('flipped');
    document.getElementById('fcProgress').textContent = '⬅ 點擊卡片翻轉查看答案 ➡';
  }
}

function markFlashcard(known) {
  if (!flashcardState) return;
  const st = flashcardState;
  const cardId = st.cards[st.currentIndex].id;
  if (known) {
    if (st.knownIds.indexOf(cardId) === -1) st.knownIds.push(cardId);
    st.learningIds = st.learningIds.filter(function(id) { return id !== cardId; });
  } else {
    if (st.learningIds.indexOf(cardId) === -1) st.learningIds.push(cardId);
    st.knownIds = st.knownIds.filter(function(id) { return id !== cardId; });
  }
  st.currentIndex++;
  st.isFlipped = false;
  renderFlashcard();
}

// ============================================================================
//  初始化
// ============================================================================
updateHomeDeckUI();
</script>
